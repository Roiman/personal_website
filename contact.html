<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get in touch with Roiman to discuss product leadership for your company." />
  <title>Contact — Roiman</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-wrapper">

    <nav>
      <ul>
        <li class="site-name"><a href="index.html">Roiman</a></li>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </ul>
    </nav>

    <main>
      <header class="page-header">
        <h1>Get in touch</h1>
      </header>

      <p class="contact-intro">Fill in the form below and I'll get back to you within a day or two.</p>
      <form
        class="contact-form"
        id="contact-form"
        action="https://api.web3forms.com/submit"
        method="POST"
        novalidate
      >
        <input type="hidden" name="access_key" value="6ef7ef2e-a9ec-427f-9721-2c262ca38fb3" />

        <!-- Thank-you message -->
        <input type="hidden" name="redirect" value="false" />

        <!-- Subject line -->
        <input type="hidden" name="subject" value="New Contact Submission" />

        <!-- Honeypot -->
        <input
          type="checkbox"
          name="botcheck"
          style="display:none;"
          tabindex="-1"
          autocomplete="off"
        />

        <div class="form-field">
          <label for="name">Your name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Jane Smith"
            required
            autocomplete="name"
          />
          <p class="field-error" id="name-error" aria-live="polite"></p>
        </div>

        <div class="form-field">
          <label for="email">Your email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="jane@company.com"
            required
            autocomplete="email"
          />
          <!-- Shown if a blocked domain is entered -->
          <p class="field-error" id="email-error" aria-live="polite"></p>
        </div>

        <div class="form-field">
          <label for="message">What's on your mind?</label>
          <textarea
            id="message"
            name="message"
            rows="6"
            placeholder="Tell me a bit about your company and what you're working on."
            required
            minlength="30"
          ></textarea>
          <p class="field-error" id="message-error" aria-live="polite"></p>
          <!-- Character count shown as user types -->
          <p class="field-hint" id="message-hint"><span id="char-count">0</span>/30 minimum characters.</p>
        </div>

        <button type="submit" class="cta-link form-submit">Send message</button>

        <p class="form-result" id="form-result" aria-live="polite"></p>
      </form>

      <!-- Shown after successful submission in place of the form -->
      <div class="form-success-state" id="form-success" style="display:none;">
        <p class="form-result form-result--success">Message sent — thanks. I'll be in touch soon.</p>
        <button class="cta-link form-resubmit" id="form-resubmit">Send another message</button>
      </div>

      <div class="contact-channels">
        <div class="contact-channel">
          <span class="channel-label">LinkedIn</span>
          <a href="https://www.linkedin.com/in/roiman" target="_blank" rel="noopener noreferrer">linkedin.com/in/roiman</a>
        </div>
      </div>

    </main>

    <footer>
      <p>&copy; 2025 Roiman</p>
    </footer>

  </div>

  <script>
    (function () {
      var form        = document.getElementById('contact-form');
      var successBox  = document.getElementById('form-success');
      var resubmitBtn = document.getElementById('form-resubmit');
      var result       = document.getElementById('form-result');

      var nameInput    = document.getElementById('name');
      var nameError    = document.getElementById('name-error');

      var emailInput   = document.getElementById('email');
      var emailError   = document.getElementById('email-error');

      var messageArea  = document.getElementById('message');
      var messageError = document.getElementById('message-error');
      var charCount    = document.getElementById('char-count');

      // Domains that are blocked as placeholder/test addresses
      var blockedDomains = ['example.com', 'test.com', 'example.org', 'test.org', 'example.net', 'mailinator.com', 'tempmail.com'];

      // Update character count live as the user types
      messageArea.addEventListener('input', function () {
        var len = messageArea.value.trim().length;
        charCount.textContent = len;
        charCount.style.color = len >= 30 ? 'var(--color-accent)' : 'inherit';
      });

      // Validate email domain against blocked list; return error string or empty string
      function validateEmail(value) {
        var trimmedValue = value.trim();

        if (!trimmedValue) {
          return 'Please enter your email address.';
        }

        var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailPattern.test(trimmedValue)) {
          return 'Please enter a valid email address.';
        }

        var domain = trimmedValue.split('@')[1].toLowerCase();

        if (blockedDomains.indexOf(domain) !== -1) {
          return 'Please use your real work or personal email address.';
        }

        return '';
      }


      // Validate names

      function validateName(value) {
        if (!value.trim()) {
          return 'Please enter your name.';
        }

        if (value.trim().length < 2) {
          return 'Name must be at least 2 characters long.';
        }

        return '';
      }

    // Validate messages

    function validateMessage(value) {
      if (value.trim().length < 30) {
        return 'Message must be at least 30 characters long.';
      }

      return '';
    }

    // Clean Errors
    function clearErrors() {
      nameError.textContent = '';
      emailError.textContent = '';
      messageError.textContent = '';
      result.textContent = '';
      result.className = 'form-result';
    }

      // Show inline email error on blur so the user gets feedback before submitting
      nameInput.addEventListener('blur', function () {
        nameError.textContent = validateName(nameInput.value);
      });

      emailInput.addEventListener('blur', function () {
        emailError.textContent = validateEmail(emailInput.value);
      });

      messageArea.addEventListener('blur', function () {
        messageError.textContent = validateMessage(messageArea.value);
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        // Re-run email validation on submit in case blur never fired
        clearErrors();

        var nameErr = validateName(nameInput.value);
        var emailErr = validateEmail(emailInput.value);
        var messageErr = validateMessage(messageArea.value);

        nameError.textContent = nameErr;
        emailError.textContent = emailErr;
        messageError.textContent = messageErr;

        if (nameErr || emailErr || messageErr) {
          result.textContent = 'Please fix the highlighted fields before sending.';
          result.classList.add('form-result--error');

          if (nameErr) {
            nameInput.focus();
          } else if (emailErr) {
            emailInput.focus();
          } else {
            messageArea.focus();
          }

          return;
        }

        var submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending…';
        result.textContent = '';
        result.className = 'form-result';

        fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: new FormData(form)
        })
          .then(function (res) { return res.json(); })
          .then(function (json) {
            if (json.success) {
              // Hide the form and show the success state with a re-submit option
              form.style.display = 'none';
              successBox.style.display = 'block';
              form.reset();
              charCount.textContent = '0';
            } else {
              result.textContent = 'Something went wrong. Please try again.';
              result.classList.add('form-result--error');
            }
          })
          .catch(function () {
            result.textContent = 'Something went wrong. Please try again.';
            result.classList.add('form-result--error');
          })
          .finally(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send message';
          });
      });

      // Re-submit button brings the form back and hides the success state
      resubmitBtn.addEventListener('click', function () {
        successBox.style.display = 'none';
        form.style.display = 'flex';
      });

    })();
  </script>

</body>
</html>
