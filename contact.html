<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get in touch with Roiman to discuss product leadership for your company." />
  <title>Contact — Roiman</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-wrapper">

    <nav>
      <ul>
        <li class="site-name"><a href="index.html">Roiman</a></li>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </ul>
    </nav>

    <main>
      <header class="page-header">
        <h1>Get in touch</h1>
      </header>

      <p class="contact-intro">Fill in the form below and I'll get back to you within a day or two.</p>

      <!-- ======================================================
           CONTACT FORM — powered by Web3Forms (web3forms.com)
           Replace YOUR_ACCESS_KEY_HERE with your actual key.
           ====================================================== -->
      <form
        class="contact-form"
        action="https://api.web3forms.com/submit"
        method="POST"
      >
        <!-- Web3Forms access key — replace this value -->
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE" />

        <!-- Redirect to a thank-you message on the same page -->
        <input type="hidden" name="redirect" value="false" />

        <!-- Subject line in the email you receive -->
        <input type="hidden" name="subject" value="New message from roiman.com" />

        <!-- Honeypot: hidden from real users, catches bots that fill every field -->
        <input
          type="checkbox"
          name="botcheck"
          style="display:none;"
          tabindex="-1"
          autocomplete="off"
        />

        <div class="form-field">
          <label for="name">Your name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Jane Smith"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-field">
          <label for="email">Your email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="jane@company.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-field">
          <label for="message">What's on your mind?</label>
          <textarea
            id="message"
            name="message"
            rows="6"
            placeholder="Tell me a bit about your company and what you're working on."
            required
          ></textarea>
        </div>

        <button type="submit" class="cta-link form-submit">Send message</button>

        <!-- Success / error message shown after submission -->
        <p class="form-result" id="form-result" aria-live="polite"></p>
      </form>

      <div class="contact-channels">
        <div class="contact-channel">
          <span class="channel-label">LinkedIn</span>
          <a href="https://www.linkedin.com/in/roiman" target="_blank" rel="noopener noreferrer">linkedin.com/in/roiman</a>
        </div>
      </div>

    </main>

    <footer>
      <p>&copy; 2025 Roiman</p>
    </footer>

  </div>

  <!-- Handles form submission without a page reload -->
  <script>
    (function () {
      var form = document.querySelector('.contact-form');
      var result = document.getElementById('form-result');

      if (!form) return;

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        var submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending…';
        result.textContent = '';
        result.className = 'form-result';

        var data = new FormData(form);

        fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: data
        })
          .then(function (res) { return res.json(); })
          .then(function (json) {
            if (json.success) {
              result.textContent = 'Message sent — thanks. I\'ll be in touch soon.';
              result.classList.add('form-result--success');
              form.reset();
            } else {
              result.textContent = 'Something went wrong. Please try emailing me directly.';
              result.classList.add('form-result--error');
            }
          })
          .catch(function () {
            result.textContent = 'Something went wrong. Please try emailing me directly.';
            result.classList.add('form-result--error');
          })
          .finally(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send message';
          });
      });
    })();
  </script>

</body>
</html>
